services:
  # ── Auto-update ────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped

  rustscan:
    image: rustscan/rustscan:latest
    container_name: rustscan
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN

  masscan:
    image: alpine:3.19
    container_name: masscan
    command: sh -c "apk add --no-cache masscan && sleep infinity"
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN

  nmap:
    image: alpine:3.19
    container_name: nmap
    command: sh -c "apk add --no-cache nmap nmap-scripts && sleep infinity"
    restart: unless-stopped

  nuclei:
    image: projectdiscovery/nuclei:latest
    container_name: nuclei
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped

  nikto:
    image: securecodebox/nikto:latest
    container_name: nikto
    entrypoint: /bin/sh
    command: ["-c", "sleep 86400d"]
    restart: unless-stopped

  searchsploit:
    image: kalilinux/kali-rolling:latest
    container_name: searchsploit
    command: bash -c "apt-get update && apt-get install -y exploitdb && sleep infinity"
    restart: unless-stopped

  metasploit:
    image: metasploitframework/metasploit-framework:latest
    container_name: metasploit
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped

  amass:
    image: caffix/amass:latest
    container_name: amass
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped

  subfinder:
    image: projectdiscovery/subfinder:latest
    container_name: subfinder
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped

  go-dork:
    build:
      context: .
      dockerfile: Dockerfile.go-dork
    container_name: go-dork
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped

  gau:
    build:
      context: .
      dockerfile: Dockerfile.gau
    container_name: gau
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped

  assetfinder:
    build:
      context: .
      dockerfile: Dockerfile.assetfinder
    container_name: assetfinder
    entrypoint: /bin/sh
    command: ["-c", "sleep infinity"]
    restart: unless-stopped
