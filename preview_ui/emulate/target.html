<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Target Manager - Phantoma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { font-family: 'Inter', monospace; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
    </style>
  </head>
  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full bg-[#0f1319]">
      <!-- Header - All in one row: Tabs, Search, Add -->
      <div class="px-3 py-2 border-b border-[#1e2535] shrink-0 flex flex-wrap items-center justify-between gap-2">
        <!-- Platform tabs -->
        <div class="flex items-center gap-1.5 flex-wrap justify-start flex-1">
          <!-- Web Tab -->
          <div class="flex items-center gap-1.5 px-2 rounded-lg text-[11px] font-medium transition-all h-7 bg-sky-500/20 text-sky-200">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span>Web</span>
            <span class="text-[9px] px-1 rounded-full bg-sky-400/30">3</span>
          </div>
          <!-- PC Tab -->
          <div class="flex items-center gap-1.5 px-2 rounded-lg text-[11px] font-medium transition-all h-7 bg-violet-500/5 hover:bg-violet-500/15 text-violet-400/70">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            <span>PC</span>
            <span class="text-[9px] px-1 rounded-full bg-violet-500/10">2</span>
          </div>
          <!-- Android Tab -->
          <div class="flex items-center gap-1.5 px-2 rounded-lg text-[11px] font-medium transition-all h-7 bg-emerald-500/5 hover:bg-emerald-500/15 text-emerald-400/70">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="8" width="14" height="12" rx="2"/><path d="M8 4h8"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
            <span>Android</span>
            <span class="text-[9px] px-1 rounded-full bg-emerald-500/10">1</span>
          </div>
          <!-- CLI Tab -->
          <div class="flex items-center gap-1.5 px-2 rounded-lg text-[11px] font-medium transition-all h-7 bg-amber-500/5 hover:bg-amber-500/15 text-amber-400/70">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            <span>CLI</span>
            <span class="text-[9px] px-1 rounded-full bg-amber-500/10">0</span>
          </div>
        </div>
        <!-- Right: Search + Add -->
        <div class="flex items-center gap-2 shrink-0">
          <div class="relative">
            <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" placeholder="Search web..." class="w-72 md:w-80 h-8 bg-[#1a1f2a] border border-[#1e2535] rounded-md pl-8 pr-3 text-sm text-gray-200 focus:border-purple-500/50 outline-none" />
          </div>
          <button class="flex items-center justify-center w-7 h-7 bg-[#1a1f2a] hover:bg-purple-500/20 hover:text-purple-400 text-gray-400 rounded-md border border-[#1e2535] hover:border-purple-500/30 transition-all">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </div>

      <!-- App Cards - Grid layout -->
      <div class="flex-1 overflow-y-auto p-2">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-1.5">
          <!-- Web App Card 1 - Active (with Stop button) -->
          <div class="flex items-center gap-1.5 rounded-lg border transition-all cursor-pointer p-1.5 bg-sky-500/5 border-sky-500/30">
            <div class="w-7 h-7 rounded-lg bg-[#1a1f2a] flex items-center justify-center flex-shrink-0 overflow-hidden">
              <span class="text-white text-xs font-bold">GO</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-semibold text-white truncate">Google</div>
              <div class="text-[10px] text-gray-400 truncate">https://google.com</div>
            </div>
            <button class="flex items-center gap-0.5 px-1.5 py-0.5 text-[10px] font-medium text-red-400 bg-red-500/10 border border-red-500/20 hover:bg-red-500/20 rounded-md transition-all shrink-0">
              <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg> Stop
            </button>
          </div>

          <!-- Web App Card 2 -->
          <div class="flex items-center gap-1.5 rounded-lg border transition-all cursor-pointer p-1.5 bg-[#0f1319] border-[#1e2535] hover:border-purple-500/30 hover:scale-[1.02]">
            <div class="w-7 h-7 rounded-lg bg-[#1a1f2a] flex items-center justify-center flex-shrink-0">
              <span class="text-white text-xs font-bold">GH</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-semibold text-white truncate">GitHub</div>
              <div class="text-[10px] text-gray-400 truncate">https://github.com</div>
            </div>
          </div>

          <!-- Web App Card 3 -->
          <div class="flex items-center gap-1.5 rounded-lg border transition-all cursor-pointer p-1.5 bg-[#0f1319] border-[#1e2535] hover:border-purple-500/30 hover:scale-[1.02]">
            <div class="w-7 h-7 rounded-lg bg-[#1a1f2a] flex items-center justify-center flex-shrink-0">
              <span class="text-white text-xs font-bold">SO</span>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-semibold text-white truncate">Stack Overflow</div>
              <div class="text-[10px] text-gray-400 truncate">https://stackoverflow.com</div>
            </div>
          </div>

          <!-- PC App Card -->
          <div class="flex items-center gap-1.5 rounded-lg border transition-all cursor-pointer p-1.5 bg-[#0f1319] border-[#1e2535] hover:border-purple-500/30 hover:scale-[1.02]">
            <div class="w-7 h-7 rounded-lg bg-[#1a1f2a] flex items-center justify-center flex-shrink-0">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-semibold text-white truncate">Visual Studio Code</div>
              <div class="text-[10px] text-gray-400 truncate">/usr/bin/code</div>
            </div>
          </div>

          <!-- Android App Card -->
          <div class="flex items-center gap-1.5 rounded-lg border transition-all cursor-pointer p-1.5 bg-[#0f1319] border-[#1e2535] hover:border-purple-500/30 hover:scale-[1.02]">
            <div class="w-7 h-7 rounded-lg bg-[#1a1f2a] flex items-center justify-center flex-shrink-0">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="5" y="8" width="14" height="12" rx="2"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-xs font-semibold text-white truncate">Pixel_6_API_33</div>
              <div class="text-[10px] text-gray-400 truncate">emulator-5554</div>
            </div>
          </div>

          <!-- Add Target Card -->
          <button class="flex items-center gap-1.5 rounded-lg border border-dashed border-[#1e2535] bg-[#0f1319] hover:border-purple-500/30 hover:bg-[#1a1f2a] transition-all cursor-pointer p-1.5">
            <div class="w-7 h-7 rounded-lg bg-[#1a1f2a] flex items-center justify-center flex-shrink-0">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-gray-400"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <div class="flex-1 text-left"><span class="text-xs font-medium text-gray-400">Add Target</span></div>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
