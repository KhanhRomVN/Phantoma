<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Viewer - Phantoma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', monospace; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
    </style>
  </head>
  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full bg-table-bodyBg">
      <div class="px-4 pt-4 pb-3 border-b border-[#1e2535] shrink-0 flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-10 rounded-lg bg-red-500/15 border border-red-500/25"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-red-400"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="flex-1"><h2 class="text-base font-bold text-white">Log Viewer</h2><p class="text-xs text-gray-400 mt-0.5">Android logcat output</p></div>
      </div>
      <!-- Toolbar -->
      <div class="h-10 border-b border-[#1e2535] flex items-center px-3 gap-2 bg-[#1a1f2a]/40 shrink-0">
        <div class="relative flex-1"><svg class="absolute left-2 top-1/2 -translate-y-1/2 w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input placeholder="Search logs..." class="w-full pl-7 pr-3 py-1 text-xs bg-[#0f1319] border border-[#1e2535] rounded text-gray-200 outline-none focus:ring-1 focus:ring-red-500/50" /></div>
        <button class="p-1.5 rounded text-gray-400 hover:bg-red-500/10 hover:text-red-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4z"/></svg></button>
        <button class="p-1.5 rounded text-gray-400 hover:bg-red-500/10 hover:text-red-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16h16"/><polygon points="8 16 12 12 16 16"/></svg></button>
      </div>
      <!-- Log entries -->
      <div class="flex-1 overflow-y-auto p-3 space-y-2 font-mono text-xs">
        <div class="py-2 px-3 rounded-md bg-red-500/5 flex flex-col gap-1">
          <div class="flex items-center gap-2 text-[10px]"><span class="font-bold px-1.5 py-0.5 rounded text-red-400 bg-red-500/10">E</span><span class="text-gray-400">12-10 14:23:45.123</span><span class="text-gray-400">AndroidRuntime</span></div>
          <div class="text-red-400/90 break-all">FATAL EXCEPTION: main Process: com.example.app, PID: 12345</div>
        </div>
        <div class="py-2 px-3 rounded-md bg-yellow-500/5 flex flex-col gap-1">
          <div class="flex items-center gap-2 text-[10px]"><span class="font-bold px-1.5 py-0.5 rounded text-yellow-400 bg-yellow-500/10">W</span><span class="text-gray-400">12-10 14:23:44.567</span><span class="text-gray-400">System</span></div>
          <div class="text-yellow-400/90 break-all">Slow operation: 245ms, expected < 100ms</div>
        </div>
        <div class="py-2 px-3 rounded-md bg-green-500/5 flex flex-col gap-1">
          <div class="flex items-center gap-2 text-[10px]"><span class="font-bold px-1.5 py-0.5 rounded text-green-400 bg-green-500/10">I</span><span class="text-gray-400">12-10 14:23:43.890</span><span class="text-gray-400">ActivityManager</span></div>
          <div class="text-green-400/90 break-all">Displayed com.example.app/.MainActivity: +1s234ms</div>
        </div>
      </div>
    </div>
  </body>
</html>
