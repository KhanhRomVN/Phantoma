<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sources - Phantoma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', monospace; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
    </style>
  </head>
  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full bg-table-bodyBg">
      <div class="px-4 pt-4 pb-3 border-b border-[#1e2535] shrink-0 flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-10 rounded-lg bg-yellow-500/15 border border-yellow-500/25"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-yellow-400"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
        <div class="flex-1"><h2 class="text-base font-bold text-white">Sources</h2><p class="text-xs text-gray-400 mt-0.5">JS, CSS, HTML and other source files</p></div>
      </div>
      <!-- Split layout: File tree left, Code view right -->
      <div class="flex-1 flex overflow-hidden">
        <!-- Left: File tree -->
        <div class="w-1/3 border-r border-[#1e2535] flex flex-col">
          <div class="px-3 py-2 border-b border-[#1e2535] shrink-0"><div class="relative"><svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input placeholder="Search files..." class="w-full h-9 bg-[#1a1f2a] border border-[#1e2535] rounded-lg pl-8 pr-3 text-sm text-gray-200 outline-none focus:border-yellow-500/50" /></div></div>
          <div class="flex-1 overflow-y-auto p-2 space-y-1">
            <div class="flex items-center gap-2 px-2 py-1.5 rounded-md cursor-pointer hover:bg-yellow-500/10 text-white"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-yellow-400"><polygon points="12 2 2 7 12 12 22 7 12 2"/></svg><span class="text-xs truncate flex-1">app.js</span><span class="text-[9px] text-gray-400">12.3 KB</span></div>
            <div class="flex items-center gap-2 px-2 py-1.5 rounded-md cursor-pointer hover:bg-yellow-500/10 bg-yellow-500/20 text-yellow-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12 2 2 7 12 12 22 7 12 2"/></svg><span class="text-xs truncate flex-1">styles.css</span><span class="text-[9px] text-gray-400">8.1 KB</span></div>
          </div>
        </div>
        <!-- Right: Code view -->
        <div class="flex-1 flex flex-col">
          <div class="px-3 py-2 border-b border-[#1e2535] flex items-center justify-between shrink-0 bg-[#1a1f2a]/20"><div class="flex items-center gap-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-yellow-400"><polygon points="12 2 2 7 12 12 22 7 12 2"/></svg><span class="text-sm font-medium text-white">styles.css</span><span class="text-[10px] px-1.5 py-0.5 rounded bg-yellow-500/10 text-yellow-400">CSS</span></div></div>
          <div class="flex-1 overflow-auto p-4"><pre class="text-xs font-mono text-gray-300 whitespace-pre-wrap">.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 8px;
}</pre></div>
        </div>
      </div>
    </div>
  </body>
</html>
