<!doctype html>
<html lang="en">

  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full bg-table-bodyBg">

        <div class="flex-1"><h2 class="text-base font-bold text-white">Compare</h2><p class="text-xs text-gray-400 mt-0.5">Compare two requests or saved comparisons</p></div>
      </div>
      <div class="px-3 py-2 border-b border-[#1e2535] flex gap-2 items-center shrink-0">

        <button class="flex items-center justify-center w-11 h-11 rounded-lg border border-[#1e2535] bg-[#1a1f2a] text-gray-400 hover:bg-green-500/20 hover:text-green-400"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-2">
        <div class="group rounded-xl border border-[#1e2535] bg-[#1a1f2a]/30 p-3 flex items-center gap-3 cursor-pointer hover:border-green-500/40 hover:bg-green-500/5 transition-all">
          <div class="w-9 h-9 rounded-lg bg-green-500/15 border border-green-500/20 flex items-center justify-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-green-400"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
          <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-white truncate">API v1 vs v2</p><div class="flex items-center gap-2 mt-1"><span class="text-[10px] font-mono text-gray-400 truncate">/v1/users</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M12 5l7 7-7 7"/></svg><span class="text-[10px] font-mono text-gray-400 truncate">/v2/users</span></div></div>
          <button class="p-1.5 rounded-lg text-gray-400 hover:text-red-400 hover:bg-red-500/10 opacity-0 group-hover:opacity-100"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div>
      </div>
