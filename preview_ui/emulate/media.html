<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Assets - Phantoma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', monospace; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
    </style>
  </head>
  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full bg-table-bodyBg">
      <!-- Header -->
      <div class="px-4 pt-4 pb-3 border-b border-[#1e2535] shrink-0 flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-10 rounded-lg bg-blue-500/15 border border-blue-500/25 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-blue-400"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></svg>
        </div>
        <div class="flex-1 min-w-0"><h2 class="text-base font-bold text-white">Media Assets</h2><p class="text-xs text-gray-400 mt-0.5">Images, videos and audio from network traffic</p></div>
      </div>
      <!-- Search -->
      <div class="px-3 py-2 border-b border-[#1e2535] shrink-0"><div class="relative"><svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input type="text" placeholder="Search media..." class="w-full h-11 bg-[#1a1f2a] border border-[#1e2535] rounded-lg pl-8 pr-3 text-sm text-gray-200 focus:border-blue-500/50 outline-none" /></div></div>
      <!-- Media grid -->
      <div class="flex-1 overflow-y-auto p-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">
          <div class="border border-[#1e2535] rounded-lg bg-[#1a1f2a]/30 overflow-hidden hover:border-blue-500/50 transition-all cursor-pointer flex flex-col h-40">
            <div class="flex-1 bg-[#1a1f2a]/50 relative flex items-center justify-center"><div class="text-gray-400 flex flex-col items-center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></svg><span class="text-[9px] uppercase mt-1">Image</span></div></div>
            <div class="p-2 border-t border-[#1e2535]"><div class="flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-blue-400"><rect x="2" y="2" width="20" height="20" rx="2.18"/></svg><span class="text-[10px] font-medium truncate text-white">logo.png</span></div><div class="text-[9px] text-gray-400 truncate">image/png</div></div>
          </div>
          <div class="border border-[#1e2535] rounded-lg bg-[#1a1f2a]/30 overflow-hidden hover:border-blue-500/50 transition-all cursor-pointer flex flex-col h-40">
            <div class="flex-1 bg-[#1a1f2a]/50 relative flex items-center justify-center"><div class="text-gray-400 flex flex-col items-center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/></svg><span class="text-[9px] uppercase mt-1">Video</span></div></div>
            <div class="p-2 border-t border-[#1e2535]"><div class="flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-purple-400"><rect x="2" y="2" width="20" height="20" rx="2.18"/></svg><span class="text-[10px] font-medium truncate text-white">preview.mp4</span></div><div class="text-[9px] text-gray-400 truncate">video/mp4</div></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
