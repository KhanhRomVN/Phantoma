<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuzzer Manager - Phantoma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', monospace; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
    </style>
  </head>
  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full bg-table-bodyBg">
      <div class="px-4 pt-4 pb-3 border-b border-[#1e2535] shrink-0 flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-10 rounded-lg bg-orange-500/15 border border-orange-500/25"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-orange-400"><path d="M20 7h-3.5M4 7h3.5M10 7h4M8 12h8M6 17h12"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>
        <div class="flex-1"><h2 class="text-base font-bold text-white">Fuzzer Manager</h2><p class="text-xs text-gray-400 mt-0.5">Spam HTTP requests with various payloads</p></div>
      </div>
      <div class="px-3 py-2 border-b border-[#1e2535] flex gap-2 items-center shrink-0">
        <div class="relative flex-1"><svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input placeholder="Search jobs..." class="w-full h-11 bg-[#1a1f2a] border border-[#1e2535] rounded-lg pl-8 pr-3 text-sm text-gray-200 outline-none focus:border-orange-500/50" /></div>
        <button class="flex items-center justify-center w-11 h-11 rounded-lg border border-[#1e2535] bg-[#1a1f2a] text-gray-400 hover:bg-orange-500/20 hover:text-orange-400"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-2">
        <div class="group rounded-xl border border-[#1e2535] bg-[#1a1f2a]/30 p-3 flex items-center gap-3 cursor-pointer hover:border-orange-500/40 hover:bg-orange-500/5 transition-all">
          <div class="w-9 h-9 rounded-lg bg-orange-500/15 border border-orange-500/20 flex items-center justify-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-orange-400"><path d="M20 7h-3.5M4 7h3.5M10 7h4M8 12h8M6 17h12"/></svg></div>
          <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-white truncate">User ID Fuzzer</p><p class="text-[10px] text-gray-400 truncate font-mono">https://api.example.com/user/§id§</p><div class="flex items-center gap-2 mt-1"><span class="text-[10px] px-1.5 py-0.5 rounded bg-orange-500/10 text-orange-400">numbers</span><span class="text-[10px] text-gray-400">100 payloads</span></div></div>
          <button class="p-1.5 rounded-lg text-gray-400 hover:text-red-400 hover:bg-red-500/10 opacity-0 group-hover:opacity-100"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div>
        <div class="group rounded-xl border border-[#1e2535] bg-[#1a1f2a]/30 p-3 flex items-center gap-3 cursor-pointer hover:border-orange-500/40 hover:bg-orange-500/5 transition-all">
          <div class="w-9 h-9 rounded-lg bg-orange-500/15 border border-orange-500/20 flex items-center justify-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-orange-400"><path d="M20 7h-3.5M4 7h3.5M10 7h4M8 12h8M6 17h12"/></svg></div>
          <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-white truncate">SQL Injection Test</p><p class="text-[10px] text-gray-400 truncate font-mono">https://api.example.com/search?q=§payload§</p><div class="flex items-center gap-2 mt-1"><span class="text-[10px] px-1.5 py-0.5 rounded bg-orange-500/10 text-orange-400">list</span><span class="text-[10px] text-gray-400">50 payloads</span></div></div>
          <button class="p-1.5 rounded-lg text-gray-400 hover:text-red-400 hover:bg-red-500/10 opacity-0 group-hover:opacity-100"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div>
      </div>
    </div>
  </body>
</html>
