<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASM Modules - Phantoma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { font-family: 'Inter', monospace; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #1a1f2a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3a3f4a; }
    </style>
  </head>
  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full bg-table-bodyBg">
      <!-- Header -->
      <div class="px-4 pt-4 pb-3 border-b border-[#1e2535] shrink-0 flex items-center gap-3">
        <div class="flex items-center justify-center w-9 h-10 rounded-lg bg-purple-500/15 border border-purple-500/25 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-purple-400"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6"/><path d="M9 12h6"/><path d="M9 15h4"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <h2 class="text-base font-bold text-text-primary text-white">WASM Modules</h2>
          <p class="text-xs text-text-secondary text-gray-400 mt-0.5">WebAssembly modules detected in network traffic</p>
        </div>
      </div>

      <!-- Search bar -->
      <div class="px-3 py-2 border-b border-[#1e2535] shrink-0">
        <div class="relative">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search modules..." class="w-full h-11 bg-[#1a1f2a] border border-[#1e2535] rounded-lg pl-8 pr-3 text-sm text-gray-200 focus:border-purple-500/50 outline-none" />
        </div>
      </div>

      <!-- Module list -->
      <div class="flex-1 overflow-y-auto p-3 space-y-2">
        <div class="group rounded-xl border border-[#1e2535] bg-[#1a1f2a]/30 p-3 flex items-center gap-3 transition-all hover:border-purple-500/40">
          <div class="w-9 h-9 rounded-lg bg-purple-500/15 border border-purple-500/20 flex items-center justify-center"><svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6"/><path d="M9 12h6"/><path d="M9 15h4"/></svg></div>
          <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-white truncate">main.wasm</p><p class="text-[10px] text-gray-400 truncate">https://example.com/assets/main.wasm</p></div>
          <button class="p-1.5 rounded-lg text-gray-400 hover:text-purple-400 hover:bg-purple-500/10"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        </div>
        <div class="group rounded-xl border border-[#1e2535] bg-[#1a1f2a]/30 p-3 flex items-center gap-3 transition-all hover:border-purple-500/40">
          <div class="w-9 h-9 rounded-lg bg-purple-500/15 border border-purple-500/20 flex items-center justify-center"><svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6"/><path d="M9 12h6"/><path d="M9 15h4"/></svg></div>
          <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-white truncate">module.wasm</p><p class="text-[10px] text-gray-400 truncate">https://cdn.example.com/module.wasm</p></div>
          <button class="p-1.5 rounded-lg text-gray-400 hover:text-purple-400 hover:bg-purple-500/10"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        </div>
      </div>
    </div>
  </body>
</html>
