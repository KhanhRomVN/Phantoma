<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intruder - Request List & Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: 'Inter', monospace;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #1a1f2a;
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #2a2f3a;
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #3a3f4a;
      }
    </style>
  </head>
  <body class="overflow-hidden bg-[#0f1319]">
    <div class="flex flex-col h-full">
      <!-- Request List -->
      <div class="flex-1 min-h-0 border-b border-[#1e2535] overflow-hidden">
        <div class="flex flex-col h-full bg-[#0f1319]">
          <!-- Toolbar -->
          <div class="flex items-center gap-2 p-2 border-b border-[#1e2535]">
            <div class="relative flex-1">
              <svg
                class="absolute left-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
              <input
                type="text"
                placeholder="Filter requests..."
                class="w-full h-8 bg-[#1a1f2a] border border-[#1e2535] rounded-md pl-8 pr-3 text-sm text-gray-200 focus:border-purple-500/50 outline-none"
              />
            </div>
            <div class="flex gap-1">
              <button class="px-2 py-1 text-xs rounded bg-[#1a1f2a] text-gray-400">GET</button>
              <button class="px-2 py-1 text-xs rounded bg-[#1a1f2a] text-gray-400">POST</button>
              <button class="px-2 py-1 text-xs rounded bg-[#1a1f2a] text-gray-400">JSON</button>
            </div>
          </div>
          <!-- Request Table -->
          <div class="flex-1 overflow-auto">
            <table class="w-full text-sm">
              <thead class="sticky top-0 bg-[#0a0e12] border-b border-[#1e2535]">
                <tr class="text-left text-gray-400 text-xs">
                  <th class="p-2 w-16">Method</th>
                  <th class="p-2">Path</th>
                  <th class="p-2 w-16">Status</th>
                  <th class="p-2 w-20">Size</th>
                  <th class="p-2 w-20">Time</th>
                 </tr>
              </thead>
              <tbody>
                <tr
                  class="border-b border-[#1e2535] hover:bg-[#1a1f2a]/50 cursor-pointer bg-purple-500/10"
                >
                  <td class="p-2 text-green-400 font-mono text-xs">GET</td>
                  <td class="p-2 text-gray-200 font-mono text-xs">/v1/users</td>
                  <td class="p-2 text-green-400">200</td>
                  <td class="p-2 text-gray-400">1.2kb</td>
                  <td class="p-2 text-gray-400">245ms</td>
                </tr>
                <tr
                  class="border-b border-[#1e2535] hover:bg-[#1a1f2a]/50 cursor-pointer"
                >
                  <td class="p-2 text-blue-400 font-mono text-xs">POST</td>
                  <td class="p-2 text-gray-200 font-mono text-xs">/v1/auth</td>
                  <td class="p-2 text-green-400">201</td>
                  <td class="p-2 text-gray-400">0.5kb</td>
                  <td class="p-2 text-gray-400">180ms</td>
                </tr>
                <tr
                  class="border-b border-[#1e2535] hover:bg-[#1a1f2a]/50 cursor-pointer"
                >
                  <td class="p-2 text-yellow-400 font-mono text-xs">PUT</td>
                  <td class="p-2 text-gray-200 font-mono text-xs">/v1/users/1</td>
                  <td class="p-2 text-yellow-400">204</td>
                  <td class="p-2 text-gray-400">0.2kb</td>
                  <td class="p-2 text-gray-400">95ms</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <!-- Request Details -->
      <div class="flex-1 min-h-0 overflow-hidden">
        <div class="flex flex-col h-full bg-[#0f1319]">
          <div class="flex border-b border-[#1e2535]">
            <button
              class="px-3 py-2 text-xs font-medium text-purple-400 border-b-2 border-purple-400"
            >
              Headers
            </button>
            <button class="px-3 py-2 text-xs font-medium text-gray-400">Body</button>
            <button class="px-3 py-2 text-xs font-medium text-gray-400">Response</button>
          </div>
          <div class="flex-1 p-3 overflow-auto">
            <div class="space-y-2">
              <div class="flex items-start gap-2 text-sm">
                <span class="text-gray-400 w-24">User-Agent:</span>
                <span class="text-gray-200">Mozilla/5.0 (Windows NT 10.0; Win64; x64)</span>
              </div>
              <div class="flex items-start gap-2 text-sm">
                <span class="text-gray-400 w-24">Accept:</span>
                <span class="text-gray-200">application/json</span>
              </div>
              <div class="flex items-start gap-2 text-sm">
                <span class="text-gray-400 w-24">Content-Type:</span>
                <span class="text-gray-200">application/json</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
